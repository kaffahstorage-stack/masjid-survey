<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel Survey</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Poppins',sans-serif;
    margin:0;
    background:#0f172a;
    color:white;
}

/* HEADER */
.header{
    padding:20px;
    text-align:center;
    background:#0f766e;
    font-size:20px;
    font-weight:600;
}

/* DASHBOARD */
.dashboard{
    display:flex;
    gap:20px;
    padding:20px;
    flex-wrap:wrap;
}

.card{
    flex:1;
    min-width:200px;
    background:#1e293b;
    padding:20px;
    border-radius:12px;
    text-align:center;
}

.card h3{
    margin-bottom:10px;
    color:#94a3b8;
}

.card p{
    font-size:28px;
    font-weight:bold;
}

/* TABLE */
.table-container{
    padding:20px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    color:black;
    border-radius:10px;
    overflow:hidden;
}

th, td{
    padding:12px;
    border-bottom:1px solid #ddd;
    text-align:center;
}

th{
    background:#0f766e;
    color:white;
}
</style>
</head>

<body>

<div class="header">🧑‍💼 Admin Panel Survey Masjid</div>

<div class="dashboard">
    <div class="card">
        <h3>Total Responden</h3>
        <p id="total">0</p>
    </div>

    <div class="card">
        <h3>Rata-rata Rating</h3>
        <p id="avg">0</p>
    </div>
</div>

<div class="table-container">
<table>
<thead>
<tr>
    <th>Nama</th>
    <th>Alamat</th>
    <th>HP</th>
    <th>Q1</th>
    <th>Q2</th>
    <th>Q3</th>
	<th>Saran</th>
    <th>Rating</th>
	<th>Aksi</th>
</tr>
</thead>

<tbody id="dataTable"></tbody>

</table>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCsyPcWbiWzZGCemmEGL38b9jn-kw1pnSQ",
  authDomain: "service-elektronik-78ae1.firebaseapp.com",
  projectId: "service-elektronik-78ae1",
  databaseURL: "https://service-elektronik-78ae1-default-rtdb.asia-southeast1.firebasedatabase.app/", // ✅ koma di sini
  storageBucket: "service-elektronik-78ae1.firebasestorage.app",
  messagingSenderId: "954366027748",
  appId: "1:954366027748:web:ef857286ea7d5e66d889f1"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "survey"), (snapshot)=>{
    let data = snapshot.val();
    if(!data) return;

    let arr = Object.entries(data);

    let table = document.getElementById("dataTable");
    table.innerHTML = "";

    let total = arr.length;
    let totalRating = 0;

    arr.reverse().forEach(([key, d]) => {
    totalRating += d.rating;

    table.innerHTML += `
    <tr>
        <td>${d.nama}</td>
        <td>${d.alamat}</td>
        <td>${d.hp}</td>
        <td>${d.q1}</td>
        <td>${d.q2}</td>
        <td>${d.q3}</td>
        <td>${d.saran || "-"}</td>
        <td>⭐ ${d.rating}</td>
        <td>
            <button onclick="hapusData('${key}')" style="
                background:#ef4444;
                color:white;
                border:none;
                padding:6px 10px;
                border-radius:6px;
                cursor:pointer;
            ">Hapus</button>
        </td>
    </tr>
    `;
});

    document.getElementById("total").innerText = total;
    document.getElementById("avg").innerText = (totalRating/total).toFixed(1);

});
function hapusData(id){
    if(confirm("Yakin mau hapus data ini? 😁")){
        remove(ref(db, "survey/" + id));
    }
}

window.hapusData = hapusData;



</script>

</body>
</html>
